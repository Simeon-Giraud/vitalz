name: Build for Appetize

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Build for Simulator
        run: |
          xcodebuild build \
            -scheme Vitalz \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Zip for Appetize
        run: |
          # Find the .app folder in the build directory
          APP_PATH=$(find build -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find .app file"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          
          # Move to the parent directory and zip the app
          cd $(dirname "$APP_PATH")
          zip -r Vitalz.app.zip $(basename "$APP_PATH")
          
          # Move zip back to root
          mv Vitalz.app.zip $GITHUB_WORKSPACE/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vitalz-Appetize-Build
          path: Vitalz.app.zip
          retention-days: 5
