name: getting ready for appetize.io

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: List Schemes
        run: xcodebuild -list -project Vitalz.xcodeproj

      - name: Build for Simulator
        run: |
          xcodebuild build \
            -project Vitalz.xcodeproj \
            -scheme Vitalz \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath derived_data \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Debug Build Output
        if: failure()
        run: |
          echo "Show Build Settings:"
          xcodebuild -showBuildSettings -project Vitalz.xcodeproj -scheme Vitalz
          echo "Listing derived data:"
          ls -R derived_data || echo "Derived data not found"

      - name: Zip for Appetize
        run: |
          # Find the .app folder in the derived data directory
          APP_PATH=$(find derived_data -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find .app file"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          
          # Move to the parent directory and zip the app
          cd $(dirname "$APP_PATH")
          zip -r Vitalz.app.zip $(basename "$APP_PATH")
          
          # Move zip back to root
          mv Vitalz.app.zip $GITHUB_WORKSPACE/

      - name: Upload to Appetize.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          curl "https://${{ secrets.APPETIZE_TOKEN }}@api.appetize.io/v1/apps" \
            -F "file=@Vitalz.app.zip" \
            -F "platform=ios"


      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vitalz-Appetize-Build
          path: Vitalz.app.zip
          retention-days: 5
