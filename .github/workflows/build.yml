name: iOS build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build simulator app
    runs-on: macos-26
    timeout-minutes: 30
    env:
      DERIVED_DATA_PATH: derived_data
      APP_ZIP_PATH: Vitalz.app.zip
      APPETIZE_TOKEN: ${{ secrets.APPETIZE_TOKEN }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show tool versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: List Schemes
        run: xcodebuild -list -project Vitalz.xcodeproj

      - name: Build for Simulator
        run: |
          xcodebuild build \
            -project Vitalz.xcodeproj \
            -scheme Vitalz \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Debug Build Output
        if: failure()
        run: |
          echo "Show Build Settings:"
          xcodebuild -showBuildSettings -project Vitalz.xcodeproj -scheme Vitalz
          echo "Listing derived data:"
          ls -R "$DERIVED_DATA_PATH" || echo "Derived data not found"

      - name: Zip simulator app
        run: |
          APP_PATH=$(find "$DERIVED_DATA_PATH" -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find .app file"
            exit 1
          fi
          echo "Found app at: $APP_PATH"

          cd $(dirname "$APP_PATH")
          zip -r Vitalz.app.zip $(basename "$APP_PATH")

          mv Vitalz.app.zip "$GITHUB_WORKSPACE/$APP_ZIP_PATH"

      - name: Upload to Appetize.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.APPETIZE_TOKEN != ''
        run: |
          curl --fail-with-body "https://${APPETIZE_TOKEN}@api.appetize.io/v1/apps" \
            -F "file=@${APP_ZIP_PATH}" \
            -F "platform=ios" \
            -o appetize-response.json

          cat appetize-response.json

      - name: Note skipped Appetize upload
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.APPETIZE_TOKEN == ''
        run: echo "Skipping Appetize upload because APPETIZE_TOKEN is not configured in repository secrets."

      - name: Upload Appetize response
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.APPETIZE_TOKEN != ''
        uses: actions/upload-artifact@v4
        with:
          name: Appetize-Response
          path: appetize-response.json
          retention-days: 5

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vitalz-Simulator-App
          path: ${{ env.APP_ZIP_PATH }}
          retention-days: 5
