name: Vitalz
options:
  bundleIdPrefix: com.simeon
targets:
  Vitalz:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/Vitalz
    settings:
      INFOPLIST_FILE: Sources/Vitalz/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.simeon.vitalz
      MARKETING_VERSION: 1.0.0
      CURRENT_PROJECT_VERSION: 1
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_IDENTITY: ""
      CODE_SIGN_ENTITLEMENTS: ""
      CODE_SIGN_STYLE: Manual
      PROVISIONING_PROFILE_SPECIFIER: ""
      DEVELOPMENT_TEAM: ""
      AD_HOC_CODE_SIGNING_ALLOWED: YES
schemes:
  Vitalz:
    build:
      targets:
        Vitalz: [run, test, profile, analyze]

