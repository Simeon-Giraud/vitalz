name: Vitalz
options:
  bundleIdPrefix: com.simeon
targets:
  Vitalz:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/Vitalz
    entitlements:
      path: Sources/Vitalz/Vitalz.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: ["health-records"]
    settings:
      INFOPLIST_FILE: Sources/Vitalz/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.simeon.vitalz
      MARKETING_VERSION: 1.0.0
      CURRENT_PROJECT_VERSION: 1
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGN_IDENTITY: ""
      CODE_SIGN_ENTITLEMENTS: "Sources/Vitalz/Vitalz.entitlements"
      CODE_SIGN_STYLE: Manual
      PROVISIONING_PROFILE_SPECIFIER: ""
      DEVELOPMENT_TEAM: ""
      AD_HOC_CODE_SIGNING_ALLOWED: YES

  VitalzUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Sources/VitalzUITests
    dependencies:
      - target: Vitalz
    settings:
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGN_IDENTITY: ""
schemes:
  Vitalz:
    build:
      targets:
        Vitalz: all
    test:
      targets:
        - target: VitalzUITests
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

