name: Vitalz
options:
  bundleIdPrefix: com.simeon
targets:
  Vitalz:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/Vitalz
    entitlements:
      path: Sources/Vitalz/Vitalz.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: ["health-records"]
        com.apple.security.application-groups: ["group.com.simeon.vitalz"]
    dependencies:
      - target: VitalzWidgetExtension
    settings:
      INFOPLIST_FILE: Sources/Vitalz/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.simeon.vitalz
      MARKETING_VERSION: 1.0.0
      CURRENT_PROJECT_VERSION: 1
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGN_IDENTITY: ""
      CODE_SIGN_ENTITLEMENTS: "Sources/Vitalz/Vitalz.entitlements"
      CODE_SIGN_STYLE: Manual
      PROVISIONING_PROFILE_SPECIFIER: ""
      DEVELOPMENT_TEAM: ""
      AD_HOC_CODE_SIGNING_ALLOWED: YES

  VitalzWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/VitalzWidget
      # Shared source files reused by the widget (no framework needed)
      - path: Sources/Vitalz/LifeMath.swift
      - path: Sources/Vitalz/ProfileStore.swift
      - path: Sources/Vitalz/WidgetDataBridge.swift
    entitlements:
      path: Sources/VitalzWidget/VitalzWidget.entitlements
      properties:
        com.apple.security.application-groups: ["group.com.simeon.vitalz"]
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.simeon.vitalz.widget
      MARKETING_VERSION: 1.0.0
      CURRENT_PROJECT_VERSION: 1
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGN_IDENTITY: ""
      CODE_SIGN_ENTITLEMENTS: "Sources/VitalzWidget/VitalzWidget.entitlements"
      CODE_SIGN_STYLE: Manual
      PROVISIONING_PROFILE_SPECIFIER: ""
      DEVELOPMENT_TEAM: ""
      AD_HOC_CODE_SIGNING_ALLOWED: YES
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension

  VitalzUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Sources/VitalzUITests
    dependencies:
      - target: Vitalz
    settings:
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGN_IDENTITY: ""
schemes:
  Vitalz:
    build:
      targets:
        Vitalz: all
        VitalzWidgetExtension: all
    test:
      targets:
        - target: VitalzUITests
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

